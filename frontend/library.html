<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Free Learning Library</title>
  <link rel="stylesheet" href="library.css" />
</head>

<body>
  <div class="page">
    <div class="card">

      <div class="header">
        <div class="title">📕 <span>Free Learning Library</span></div>
        <p>All PDFs shared across cohorts</p>

        <input
          id="searchInput"
          type="text"
          placeholder="Search files or cohorts..."
          oninput="filterLibrary()"
        />
      </div>

      <div id="libraryList" class="list"></div>

    </div>
  </div>

  <script src="library.js"></script>
</body>
</html>
